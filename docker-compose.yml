services:
  xirang-backend:
    image: golang:1.26.1
    container_name: xirang-backend
    working_dir: /workspace/backend
    volumes:
      - ./:/workspace
    env_file:
      - backend/.env
    environment:
      SERVER_ADDR: :8080
      SQLITE_PATH: /workspace/backend/xirang.db
      RSYNC_BINARY: rsync
      # CORS_ALLOWED_ORIGINS 默认为 http://localhost:5173,http://127.0.0.1:5173。
      # 局域网 IP 访问时会自动通过"同主机 Origin"回退放行，无需额外配置。
    ports:
      - "8080:8080"
    command: sh -c "go mod download && go run ./cmd/server"

  xirang-web:
    image: node:20
    container_name: xirang-web
    working_dir: /workspace/web
    volumes:
      - ./:/workspace
    environment:
      VITE_API_BASE_URL: /api/v1
      VITE_PROXY_TARGET: http://xirang-backend:8080
    ports:
      - "5173:5173"
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      - xirang-backend
