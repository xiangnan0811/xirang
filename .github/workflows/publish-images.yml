name: Publish Docker Images

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      version:
        description: "维护者手动重发时使用的镜像版本号（例如 0.2.0 或 v0.2.0）"
        required: true
        type: string
      source_ref:
        description: "维护者手动重发时使用的源码 ref（tag/branch/SHA）"
        required: true
        type: string

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  attestations: write
  id-token: write

jobs:
  build-and-push:
    name: Build & Push (xirang)
    runs-on: ubuntu-latest
    env:
      IMAGE_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE || secrets.DOCKERHUB_USERNAME }}

    steps:
      - name: Reject prerelease releases
        if: github.event_name == 'release' && github.event.release.prerelease
        run: |
          echo "pre-release publishing is not supported in this repository" >&2
          exit 1

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.event.inputs.source_ref }}

      - name: Resolve source commit
        id: source
        shell: bash
        run: echo "commit=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"

      - name: Setup QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            raw_tag="${{ github.event.release.tag_name }}"
          else
            raw_tag="${{ github.event.inputs.version }}"
          fi

          clean_tag="${raw_tag#refs/tags/}"
          clean_version="${clean_tag#v}"

          if [[ -z "${clean_version}" ]]; then
            echo "version is empty" >&2
            exit 1
          fi

          if ! echo "${clean_version}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "invalid semver: ${clean_version}" >&2
            exit 1
          fi

          echo "version=${clean_version}" >> "${GITHUB_OUTPUT}"

      - name: DockerHub login
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: docker.io/${{ env.IMAGE_NAMESPACE }}/xirang
          tags: |
            type=raw,value=v${{ steps.version.outputs.version }}
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest,enable=${{ github.event_name == 'release' && !github.event.release.prerelease }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.source.outputs.commit }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: deploy/allinone/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=xirang
          cache-to: type=gha,scope=xirang,mode=max

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: docker.io/${{ env.IMAGE_NAMESPACE }}/xirang:v${{ steps.version.outputs.version }}
          format: 'table'
          exit-code: '1'
          severity: 'HIGH,CRITICAL'
          ignore-unfixed: true

      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-name: docker.io/${{ env.IMAGE_NAMESPACE }}/xirang
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Build summary
        run: |
          {
            echo "### Image Published: xirang"
            echo ""
            echo "- Version: ${{ steps.version.outputs.version }}"
            echo "- Source ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.event.inputs.source_ref }}"
            echo "- Source commit: ${{ steps.source.outputs.commit }}"
            echo "- Digest: ${{ steps.build.outputs.digest }}"
            echo "- Latest updated: ${{ github.event_name == 'release' && 'yes' || 'no (manual rebuild)' }}"
            echo "- Tags:"
            echo "\`${{ steps.meta.outputs.tags }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
