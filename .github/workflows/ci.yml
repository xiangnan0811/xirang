name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pr-title:
    name: PR Title
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate pull request title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: bash scripts/check-pr-title.sh "${PR_TITLE}"

  backend:
    name: Backend Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: backend/go.mod
          cache: true

      - name: Lint backend
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          working-directory: backend

      - name: Download modules
        run: go mod download

      - name: Run backend tests
        run: go test -coverprofile=coverage.out ./...

      - name: Build backend
        run: go build ./...

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Check Go vulnerabilities
        run: govulncheck ./...

      - name: Upload backend coverage
        if: always()
        continue-on-error: true
        uses: codecov/codecov-action@v5
        with:
          files: backend/coverage.out
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}

  frontend:
    name: Frontend Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check npm vulnerabilities
        run: npm audit --audit-level=moderate

      - name: Run frontend check
        run: npm run check

      - name: Check frontend bundle budget
        # Requires dist/ produced by 'npm run check' (which includes build)
        run: node scripts/check-bundle-budget.mjs

      - name: Upload frontend coverage
        if: always()
        continue-on-error: true
        uses: codecov/codecov-action@v5
        with:
          files: web/coverage/lcov.info
          flags: frontend
          token: ${{ secrets.CODECOV_TOKEN }}

  doc-freshness:
    name: Doc Freshness Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Check doc freshness
        run: bash scripts/check-doc-freshness.sh
