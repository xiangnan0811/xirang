<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Button Primitive – Sage UI Gallery</title>
  <style>
    :root {
      --background: 0 0% 100%;
      --foreground: 222 47% 11%;
      --primary: 221 83% 53%;
      --primary-foreground: 0 0% 100%;
      --secondary: 210 20% 96%;
      --muted: 210 20% 96%;
      --muted-foreground: 215 16% 47%;
      --accent: 210 20% 93%;
      --border: 214 32% 91%;
      --destructive: 0 84% 60%;
      --destructive-foreground: 0 0% 100%;
      --ring: 221 83% 53%;
    }
    .dark {
      --background: 222 47% 8%;
      --foreground: 210 40% 96%;
      --primary: 217 91% 60%;
      --primary-foreground: 222 47% 8%;
      --secondary: 217 33% 17%;
      --muted: 217 33% 17%;
      --muted-foreground: 215 20% 65%;
      --accent: 217 33% 20%;
      --border: 217 33% 20%;
      --destructive: 0 72% 51%;
      --destructive-foreground: 0 0% 100%;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: hsl(var(--background));
      color: hsl(var(--foreground));
      padding: 2rem;
      transition: background 0.2s, color 0.2s;
    }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.25rem; }
    p.sub { font-size: 0.875rem; color: hsl(var(--muted-foreground)); margin-bottom: 2rem; }
    h2 { font-size: 0.875rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
         color: hsl(var(--muted-foreground)); margin: 1.5rem 0 0.75rem; }
    .row { display: flex; flex-wrap: wrap; align-items: center; gap: 0.75rem; margin-bottom: 0.5rem; }

    button {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 0.5rem; white-space: nowrap;
      font-size: 0.875rem; font-weight: 500;
      transition: background 0.15s, color 0.15s, transform 0.1s, box-shadow 0.15s;
      cursor: pointer; border: none; outline: none;
    }
    button:focus-visible { box-shadow: 0 0 0 3px hsl(var(--ring) / 0.35); }
    button:active { transform: scale(0.95); }
    button:disabled { opacity: 0.5; pointer-events: none; }

    /* variants */
    .btn-default { background: hsl(var(--primary)); color: hsl(var(--primary-foreground));
                   border-radius: 0.375rem; padding: 0.5rem 1rem; }
    .btn-default:hover { background: hsl(var(--primary) / 0.9); }

    .btn-secondary { background: hsl(var(--secondary)); color: hsl(var(--foreground));
                     border: 1px solid hsl(var(--border)); border-radius: 0.375rem; padding: 0.5rem 1rem; }
    .btn-secondary:hover { background: hsl(var(--accent)); }

    .btn-outline { background: transparent; color: hsl(var(--foreground));
                   border: 1px solid hsl(var(--border)); border-radius: 0.375rem; padding: 0.5rem 1rem; }
    .btn-outline:hover { background: hsl(var(--accent)); }

    .btn-ghost { background: transparent; color: hsl(var(--muted-foreground));
                 border-radius: 0.375rem; padding: 0.5rem 1rem; }
    .btn-ghost:hover { background: hsl(var(--accent)); color: hsl(var(--foreground)); }

    .btn-destructive { background: hsl(var(--destructive)); color: hsl(var(--destructive-foreground));
                       border-radius: 0.375rem; padding: 0.5rem 1rem; }
    .btn-destructive:hover { background: hsl(var(--destructive) / 0.9); }

    /* sizes */
    .btn-sm  { font-size: 0.75rem; padding: 0.375rem 0.75rem; }
    .btn-lg  { font-size: 1rem; padding: 0.625rem 1.5rem; }
    .btn-icon { width: 2.25rem; height: 2.25rem; padding: 0; }

    /* shape */
    .pill { border-radius: 9999px; font-weight: 600; }

    /* toggle button */
    #toggle {
      position: fixed; top: 1rem; right: 1rem;
      padding: 0.4rem 0.8rem; border-radius: 0.375rem; font-size: 0.75rem;
      background: hsl(var(--secondary)); color: hsl(var(--foreground));
      border: 1px solid hsl(var(--border)); cursor: pointer;
    }
    hr { border: none; border-top: 1px solid hsl(var(--border)); margin: 2rem 0; }
  </style>
</head>
<body>
  <button id="toggle" onclick="document.documentElement.classList.toggle('dark')">Toggle dark</button>

  <h1>Button</h1>
  <p class="sub">All variants, sizes, shapes, and states for the Sage <code>&lt;Button&gt;</code> component.</p>

  <h2>Variants</h2>
  <div class="row">
    <button class="btn-default">Default</button>
    <button class="btn-secondary">Secondary</button>
    <button class="btn-outline">Outline</button>
    <button class="btn-ghost">Ghost</button>
    <button class="btn-destructive">Destructive</button>
  </div>

  <h2>Sizes</h2>
  <div class="row">
    <button class="btn-default btn-sm">Small</button>
    <button class="btn-default">Default</button>
    <button class="btn-default btn-lg">Large</button>
    <button class="btn-default btn-icon" aria-label="icon">★</button>
  </div>

  <h2>Shapes</h2>
  <div class="row">
    <button class="btn-default">Rect (default)</button>
    <button class="btn-default pill">Pill</button>
  </div>

  <h2>States</h2>
  <div class="row">
    <button class="btn-default" disabled>Disabled</button>
    <button class="btn-default">
      <span style="display:inline-block;width:1rem;height:1rem;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin 0.75s linear infinite"></span>
      Loading
    </button>
    <button class="btn-outline" disabled>Outline disabled</button>
  </div>

  <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
</body>
</html>
