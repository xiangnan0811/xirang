<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Badge Primitive – Sage UI Gallery</title>
  <style>
    :root {
      --background: 0 0% 100%;
      --foreground: 222 47% 11%;
      --muted: 210 20% 96%;
      --muted-foreground: 215 16% 47%;
      --border: 214 32% 91%;
      --success: 142 72% 29%;
      --warning: 38 92% 50%;
      --destructive: 0 84% 60%;
      --info: 217 91% 60%;
    }
    .dark {
      --background: 222 47% 8%;
      --foreground: 210 40% 96%;
      --muted: 217 33% 17%;
      --muted-foreground: 215 20% 65%;
      --border: 217 33% 20%;
      --success: 142 72% 45%;
      --warning: 38 92% 60%;
      --destructive: 0 72% 60%;
      --info: 217 91% 65%;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: hsl(var(--background));
      color: hsl(var(--foreground));
      padding: 2rem;
      transition: background 0.2s, color 0.2s;
    }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.25rem; }
    p.sub { font-size: 0.875rem; color: hsl(var(--muted-foreground)); margin-bottom: 2rem; }
    h2 { font-size: 0.875rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
         color: hsl(var(--muted-foreground)); margin: 1.5rem 0 0.75rem; }
    .row { display: flex; flex-wrap: wrap; align-items: center; gap: 0.75rem; margin-bottom: 0.5rem; }

    .badge {
      display: inline-flex; align-items: center; gap: 0.375rem;
      border-radius: 9999px; padding: 3px 10px;
      font-size: 10.5px; font-weight: 500; line-height: 1.4;
    }
    .dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
    .badge-success  { background: hsl(var(--success) / 0.16); color: hsl(var(--success)); }
    .dot-success    { background: hsl(var(--success)); }
    .badge-warning  { background: hsl(var(--warning) / 0.22); color: hsl(38 50% 28%); }
    .dark .badge-warning { color: hsl(var(--warning)); }
    .dot-warning    { background: hsl(var(--warning)); }
    .badge-destructive { background: hsl(var(--destructive) / 0.18); color: hsl(var(--destructive)); }
    .dot-destructive   { background: hsl(var(--destructive)); }
    .badge-info     { background: hsl(var(--info) / 0.18); color: hsl(var(--info)); }
    .dot-info       { background: hsl(var(--info)); }
    .badge-neutral  { background: hsl(var(--muted)); color: hsl(var(--muted-foreground)); }
    .dot-neutral    { background: hsl(var(--muted-foreground)); }

    #toggle {
      position: fixed; top: 1rem; right: 1rem;
      padding: 0.4rem 0.8rem; border-radius: 0.375rem; font-size: 0.75rem;
      background: hsl(var(--muted)); color: hsl(var(--foreground));
      border: 1px solid hsl(var(--border)); cursor: pointer;
    }
  </style>
</head>
<body>
  <button id="toggle" onclick="document.documentElement.classList.toggle('dark')">Toggle dark</button>

  <h1>Badge</h1>
  <p class="sub">All tone variants for the Sage <code>&lt;Badge&gt;</code> component.</p>

  <h2>Tones (with dot)</h2>
  <div class="row">
    <span class="badge badge-success"><span class="dot dot-success"></span>Success</span>
    <span class="badge badge-warning"><span class="dot dot-warning"></span>Warning</span>
    <span class="badge badge-destructive"><span class="dot dot-destructive"></span>Destructive</span>
    <span class="badge badge-info"><span class="dot dot-info"></span>Info</span>
    <span class="badge badge-neutral"><span class="dot dot-neutral"></span>Neutral</span>
  </div>

  <h2>Without dot</h2>
  <div class="row">
    <span class="badge badge-success">Success</span>
    <span class="badge badge-warning">Warning</span>
    <span class="badge badge-destructive">Destructive</span>
    <span class="badge badge-info">Info</span>
    <span class="badge badge-neutral">Neutral</span>
  </div>

  <h2>Usage examples</h2>
  <div class="row">
    <span class="badge badge-success"><span class="dot dot-success"></span>Online</span>
    <span class="badge badge-warning"><span class="dot dot-warning"></span>Warning</span>
    <span class="badge badge-destructive"><span class="dot dot-destructive"></span>Failed</span>
    <span class="badge badge-info"><span class="dot dot-info"></span>Running</span>
    <span class="badge badge-neutral"><span class="dot dot-neutral"></span>Disabled</span>
  </div>
</body>
</html>
