services:
  xirang:
    image: ${IMAGE_REGISTRY:-docker.io}/${IMAGE_NAMESPACE:-xirang}/xirang:${IMAGE_TAG:-latest}
    container_name: xirang
    env_file:
      - ./backend/.env.production
    volumes:
      - xirang-data:/data
      - xirang-backup:/backup
      - ./deploy/certs:/etc/nginx/certs:ro
    ports:
      - "80:80"
      - "443:443"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE   # nginx 绑定 80/443
      - CHOWN              # nginx 启动时调整文件所有者
      - SETGID             # nginx worker 降权
      - SETUID             # nginx worker 降权
      - DAC_OVERRIDE       # cron 读取 /etc/cron.d

volumes:
  xirang-data:
  xirang-backup:
