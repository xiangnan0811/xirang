services:
  xirang:
    image: ${IMAGE_REGISTRY:-docker.io}/${IMAGE_NAMESPACE:-xirang}/xirang:${IMAGE_TAG:-latest}
    container_name: xirang
    env_file:
      - .env
    volumes:
      - ./data:/data           # SQLite 数据库及应用数据，务必备份此目录
      - ./backups:/backup      # 自动备份目录（每日 02:00 备份，保留 30 天）
      # HTTPS 模式：放入证书后取消注释（不挂载则自动使用 HTTP 模式）
      # - ./certs:/etc/nginx/certs:ro
    ports:
      - "${HTTP_PORT:-80}:8080"
      - "${HTTPS_PORT:-443}:8443"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
