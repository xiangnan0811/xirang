services:
  xirang:
    image: ${IMAGE_REGISTRY:-docker.io}/${IMAGE_NAMESPACE:-xirang}/xirang:${IMAGE_TAG:-latest}
    container_name: xirang
    env_file:
      - ./backend/.env.production
    volumes:
      - xirang-data:/data
      - xirang-backup:/backup
      - ./deploy/certs:/etc/nginx/certs:ro
    ports:
      - "80:8080"
      - "443:8443"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m

volumes:
  xirang-data:
  xirang-backup:
